name: emombti
description: >-
  A app that about the MBTI personality type.
publish_to: 'none'
version: 0.1.2

environment:
  sdk: "^3.11.5"
  flutter: "^3.41.7"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  intl: any
  http: ^1.6.0
  freezed_annotation: ^3.0.0
  go_router: ^16.0.0
  google_fonts: ^6.2.1
  json_annotation: ^4.9.0
  logging: ^1.3.0
  provider: ^6.1.2
  share_plus: ^10.1.3
  speech_to_text: ^7.3.0
  mobile_scanner: ^7.2.0
  path: ^1.9.1

  url_launcher: ^6.3.2
  flutter_local_notifications: ^17.0.0
  timeago: ^3.7.1
  uuid: ^4.5.3

  flutter_slidable: ^4.0.0
  flutter_svg: ^2.0.16
  flutter_html: ^3.0.0

  flutter_native_splash: ^2.4.7

  sensors_plus: ^6.1.2
  connectivity_plus: ^6.1.5

  video_player: ^2.11.1
  chewie: ^1.13.1

  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

  lottie: ^3.3.3

  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  file_picker: ^10.3.7
  flutter_chat_ui: ^2.11.1
  flutter_chat_core: ^2.9.0
  flyer_chat_file_message: ^2.4.0
  flyer_chat_image_message: ^2.3.0
  flyer_chat_system_message: ^2.2.0
  flyer_chat_text_message: ^2.6.0
  flyer_chat_text_stream_message: ^2.3.0
  appflowy_editor: ^6.2.0
  google_generative_ai: ^0.4.7

  shared_preferences: ^2.3.5
  sqflite: ^2.4.2
  pocketbase: ^0.23.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/json/
    - assets/images/
    - assets/policies/
  generate: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_v4.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo_v4.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"

flutter_native_splash:
  color: "#FEF8E9"
  image: assets/images/logo_v4.png
  # fullscreen: true
  android_12:
    color: "#FEF8E9"
    image: assets/images/logo_v4.png
    icon_background_color: "#111111"