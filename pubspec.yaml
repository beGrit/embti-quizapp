name: emombti
description: >-
  A app that about the MBTI personality type.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.11.1

dependencies:
  carousel_slider: ^5.1.2
  cached_network_image: ^3.4.1
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.6.0
  flutter_svg: ^2.0.16
  freezed_annotation: ^3.0.0
  go_router: ^16.0.0
  google_fonts: ^6.2.1
  intl: any
  json_annotation: ^4.9.0
  logging: ^1.3.0
  provider: ^6.1.2
  share_plus: ^10.1.3
  shared_preferences: ^2.3.5
  speech_to_text: ^7.3.0
  video_player: ^2.11.1
  webview_flutter: ^4.10.0
  mobile_scanner: ^7.2.0
  sensors_plus: ^6.1.2
  url_launcher: ^6.3.2
  image_picker: ^1.1.2
  flutter_local_notifications: ^17.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  uuid: ^4.5.3
  flutter_slidable: ^4.0.0
  pocketbase: ^0.23.3
  connectivity_plus: ^6.1.5
  appflowy_editor: ^6.2.0
  timeago: ^3.7.1
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.4.0
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail_image_network: ^1.2.0
  mocktail: ^1.0.4
  integration_test:
    sdk: flutter
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  flutter_lints: ^6.0.0
  flutter_launcher_icons: "^0.14.4"

flutter:
  uses-material-design: true
  assets:
    - assets/json/
    - assets/images/
    - assets/policies/
  generate: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo_v3.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/logo_v3.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/images/logo_v3.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/logo_v3.png"